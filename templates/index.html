<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriorityAI</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/script.js"></script>
</head>

<body>

    <header class="header">
        <h1>PriorityAI</h1>
        <p>AI-powered ticket prioritization</p>
    </header>

    <main class="container">

        <section class="card">
            <p class="card-title">Analyze Ticket</p>
            <div class="form-group">

                <div class="select-wrapper">
                    <label for="ticketSelect">Ticket</label>
                    <select id="ticketSelect" onchange="handleSelectChange()">
                        <option value="">Select a ticket</option>
                        <option value="new">+ New Ticket</option>
                    </select>
                </div>

                <input id="title" placeholder="Title" style="display:none;">

                <textarea id="description" placeholder="Description" style="display:none;"></textarea>

                <button onclick="createTicket()">Analyze with AI</button>

                <p id="result"></p>

            </div>
        </section>

        <section class="card">
            <p class="card-title">Tickets</p>
            <div id="list"></div>
        </section>

    </main>

</body>

</html>
